<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Planner - Student Study Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="tips.html">Study Tips</a></li>
        </ul>
    </nav>

    <!-- Header -->
    <header>
        <h1>My Study Planner</h1>
        <p>Add your subjects, topics and deadlines below.</p>
    </header>
    <div id="reminder-banner"></div>
    <section>
        <h2>Add a New Task</h2>
		

        <!-- Subject Dropdown -->
        <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject">
                <option value="">-- Select Subject --</option>
                <option value="Mathematics">Mathematics</option>
                <option value="English">English</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
                <option value="Computer Science">Computer Science</option>
                <option value="History">History</option>
                <option value="Geography">Geography</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <!-- Topic -->
        <div class="form-group">
            <label for="topic">Topic</label>
            <input type="text" id="topic" placeholder="e.g. Quadratic Equations">
        </div>

        <!-- Start Date -->
        <div class="form-group">
            <label for="startdate">Start Date</label>
            <input type="date" id="startdate">
        </div>

        <!-- Deadline -->
        <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline">
        </div>

        <!-- Priority -->
        <div class="form-group">
            <label for="priority">Priority</label>
            <select id="priority">
                <option value="">-- Select Priority --</option>
                <option value="High">🔴 High</option>
                <option value="Medium">🟡 Medium</option>
                <option value="Low">🟢 Low</option>
            </select>
        </div>

        <!-- Status -->
        <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
                <option value="">-- Select Status --</option>
                <option value="Not Started">Not Started</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
            </select>
        </div>

        <button onclick="addTask()">Add Task</button>

        <h2>My Tasks</h2>
        <ul id="task-list"></ul>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Student Study Planner</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
