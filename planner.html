<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Planner - Student Study Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="tips.html">Study Tips</a></li>
        </ul>
    </nav>

    <!-- Planner Section -->
    <header>
        <h1>My Study Planner</h1>
        <p>Add your subjects, tasks and deadlines below.</p>
    </header>

    <section>
        <h2>Add a New Task</h2>

        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="e.g. Mathematics">
        </div>

        <div class="form-group">
            <label for="task">Task</label>
            <input type="text" id="task" placeholder="e.g. Read chapter 3">
        </div>

        <div class="form-group">
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline">
        </div>

        <button onclick="addTask()">Add Task</button>

        <h2>My Tasks</h2>
        <ul id="task-list"></ul>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Student Study Planner</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
