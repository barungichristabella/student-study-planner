<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Student Study Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="about.html">About</a></li>
            <li><a href="index.html">Home</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="tips.html">Study Tips</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Header -->
    <header>
        <h1>Contact Us</h1>
        <p>Have feedback or suggestions? We'd love to hear from you.</p>
    </header>

    <!-- Contact Section -->
    <section>
        <h2>Send Us a Message</h2>

        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="e.g. Christabella Barungi">
        </div>

        <div class="form-group">
            <label for="email">Your Email</label>
            <input type="email" id="email" placeholder="e.g. example@gmail.com">
        </div>

        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" placeholder="e.g. Feedback on Study Planner">
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="6" placeholder="Write your message here..."></textarea>
        </div>

        <button onclick="sendMessage()">Send Message</button>

        <div id="contact-feedback"></div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Student Study Planner</p>
    </footer>

    <script src="contact.js"></script>
</body>
</html>
